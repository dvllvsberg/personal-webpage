<!DOCTYPE html>
<html>
<head>
  <title>Проекты</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/icons8-reaper-flat-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/icons8-reaper-flat-32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/icons8-reaper-flat-96.png">
  <style>
    body {
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), black;
      color: rgb(255, 255, 255);
      font-family: "Courier New", monospace;
      padding-top: 70px;
    }

    /* Неоновые стили для навигации */
    .navbar {
      background-color: rgba(0, 0, 0, 0.95) !important;
      border-bottom: 2px solid #ff0000;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
    }

    .navbar-brand {
      color: #ff0000 !important;
      font-weight: bold;
      text-shadow: 0 0 5px #ff0000,
                   0 0 10px #ff0000,
                   0 0 20px #ff0000;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      position: relative;
      padding-left: 30px;
    }

    .navbar-brand::before {
      content: "☠";
      position: absolute;
      left: 0;
      animation: skullRotate 3s infinite linear;
    }

    .nav-link {
      color: #ffffff !important;
      transition: all 0.3s ease;
      position: relative;
      padding: 8px 15px;
      margin: 0 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
    }

    .nav-link::before {
      content: "☠";
      position: absolute;
      left: -20px;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .nav-link:hover {
      color: #ff0000 !important;
      text-shadow: 0 0 5px #ff0000,
                   0 0 10px #ff0000,
                   0 0 20px #ff0000;
    }

    .nav-link:hover::before {
      opacity: 1;
      left: -15px;
    }

    .navbar-toggler {
      border-color: #ff0000 !important;
      box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 0, 0, 1%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
    }

    @keyframes skullRotate {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }

    .active-link {
      color: #ff0000 !important;
      text-shadow: 0 0 5px #ff0000,
                   0 0 10px #ff0000,
                   0 0 20px #ff0000;
      position: relative;
    }

    .active-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #ff0000;
      box-shadow: 0 0 5px #ff0000,
                  0 0 10px #ff0000;
    }

    .project-card {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #ff0000;
      margin: 20px 0;
      padding: 20px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .project-card:hover {
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
      transform: translateY(-5px);
    }

    .project-title {
      color: #ff0000;
      font-size: 1.5em;
      margin-bottom: 15px;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
    }

    .project-description {
      color: #ffffff;
      line-height: 1.6;
    }

    .project-tech {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #ff0000;
    }

    .tech-tag {
      display: inline-block;
      background: rgba(255, 0, 0, 0.1);
      color: #ff0000;
      padding: 3px 10px;
      margin: 2px;
      border: 1px solid #ff0000;
      border-radius: 3px;
      font-size: 0.9em;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }

    .project-links {
      margin-top: 15px;
    }

    .project-links a {
      color: #ff0000;
      text-decoration: none;
      margin-right: 15px;
      transition: all 0.3s ease;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }

    .project-links a:hover {
      color: #ffffff;
      text-shadow: 0 0 5px #ff0000;
    }

    .project-status {
      float: right;
      color: #ff0000;
      font-style: italic;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }

    h1 {
      color: rgb(66, 13, 13);
      text-align: center;
      text-shadow: 1px 1px 2px rgb(255, 0, 0);
      margin-bottom: 30px;
    }

    .projects-loading,
    .projects-error {
      text-align: center;
      color: #ff6666;
      padding: 2rem 1rem;
      letter-spacing: 0.05em;
    }

    .projects-error {
      border: 1px dashed #ff0000;
      background: rgba(255, 0, 0, 0.05);
      margin: 1rem 0;
    }

    .projects-error[hidden],
    .projects-loading[hidden] {
      display: none !important;
    }

    .project-meta {
      margin-top: 10px;
      font-size: 0.85em;
      color: rgba(255, 100, 100, 0.85);
    }

    .project-no-desc {
      opacity: 0.55;
      font-style: italic;
    }

    .projects-github-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      margin-bottom: 2rem;
    }

    .projects-github-link a {
      color: #ff0000;
      text-decoration: none;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }

    .projects-github-link a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- Навигационное меню -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="main.html">IAYSISDEAD</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#darkNavbar" aria-controls="darkNavbar" aria-expanded="false" aria-label="Меню">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="darkNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="main.html">Главная</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="diary.html">Дневник</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active-link" href="projects.html">Проекты</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="bio.html">Биография</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contacts.html">Контакты</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1>Мои Проекты</h1>

    <p id="projects-loading" class="projects-loading">Загрузка репозиториев с GitHub…</p>
    <p id="projects-error" class="projects-error" hidden></p>
    <div id="projects-list"></div>

    <p class="projects-github-link">
      <a href="https://github.com/dvllvsberg" target="_blank" rel="noopener noreferrer">→ все репозитории на GitHub</a>
    </p>
  </div>

  <script src="js/projects.js"></script>
</body>
</html>
