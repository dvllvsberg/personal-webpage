<!DOCTYPE html>
<html lang="ru">
<head>
  <title>Дневник</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/icons8-reaper-flat-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/icons8-reaper-flat-32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon/icons8-reaper-flat-96.png">
  <style>
    body {
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), black;
      color: rgb(255, 255, 255);
      font-family: "Courier New", monospace;
      padding-top: 70px;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.95) !important;
      border-bottom: 2px solid #ff0000;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
    }

    .navbar-brand {
      color: #ff0000 !important;
      font-weight: bold;
      text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 20px #ff0000;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      position: relative;
      padding-left: 30px;
    }

    .navbar-brand::before {
      content: "☠";
      position: absolute;
      left: 0;
      animation: skullRotate 3s infinite linear;
    }

    .nav-link {
      color: #ffffff !important;
      transition: all 0.3s ease;
      position: relative;
      padding: 8px 15px;
      margin: 0 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
    }

    .nav-link:hover {
      color: #ff0000 !important;
      text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 20px #ff0000;
    }

    .navbar-toggler {
      border-color: #ff0000 !important;
      box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 0, 0, 1%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
    }

    @keyframes skullRotate {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }

    .active-link {
      color: #ff0000 !important;
      text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 20px #ff0000;
      position: relative;
    }

    .active-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #ff0000;
      box-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000;
    }

    h1 {
      color: rgb(66, 13, 13);
      text-align: center;
      text-shadow: 1px 1px 2px rgb(255, 0, 0);
      margin-bottom: 10px;
    }

    .diary-subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9em;
      margin-bottom: 30px;
    }

    #auth-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .auth-status {
      color: #ff6666;
      font-size: 0.9em;
    }

    #login-form, #composer {
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #ff0000;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.25);
    }

    #login-form[hidden], #composer[hidden] {
      display: none !important;
    }

    .diary-label {
      display: block;
      color: #ff0000;
      margin-bottom: 6px;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .diary-input,
    .diary-textarea {
      width: 100%;
      background: #111;
      border: 1px solid #660000;
      color: #fff;
      padding: 10px 12px;
      font-family: inherit;
      margin-bottom: 12px;
      border-radius: 0;
    }

    .diary-input:focus,
    .diary-textarea:focus {
      outline: none;
      border-color: #ff0000;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.35);
    }

    .diary-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .diary-btn {
      background: #ff0000;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-family: inherit;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }

    .diary-btn:hover {
      background: #cc0000;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .diary-btn-small {
      padding: 6px 14px;
      font-size: 0.85em;
    }

    .diary-btn-ghost {
      background: transparent;
      border: 1px solid #ff0000;
      color: #ff0000;
    }

    .diary-btn-ghost:hover {
      background: rgba(255, 0, 0, 0.15);
    }

    .diary-btn-danger {
      background: transparent;
      border: 1px solid #660000;
      color: #ff4444;
    }

    .diary-btn-danger:hover {
      background: rgba(255, 0, 0, 0.2);
    }

    .diary-error, .diary-empty {
      text-align: center;
      padding: 40px 20px;
      color: #ff6666;
      border: 1px dashed #660000;
    }

    #loading {
      text-align: center;
      color: #888;
      padding: 30px;
    }

    .diary-entry {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #ff0000;
      margin: 20px 0;
      padding: 20px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .diary-entry:hover {
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      transform: translateY(-2px);
    }

    .diary-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #ff0000;
      padding-bottom: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .diary-date {
      color: #ff0000;
      font-size: 0.9em;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }

    .diary-author {
      color: #888;
      font-size: 0.85em;
    }

    .diary-content {
      color: #ffffff;
      line-height: 1.6;
    }

    .diary-mood {
      color: #ff0000;
      font-style: italic;
      margin-top: 15px;
      text-align: right;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
    }

    .reactions-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #330000;
    }

    .reaction-btn {
      background: #111;
      border: 1px solid #660000;
      color: #fff;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .reaction-btn:hover,
    .reaction-btn.active {
      border-color: #ff0000;
      color: #ff0000;
      box-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
    }

    .comments-section {
      margin-top: 14px;
    }

    .comments-toggle {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9em;
      padding: 0;
      text-decoration: underline;
    }

    .comments-toggle:hover {
      color: #ff0000;
    }

    .comments-panel {
      margin-top: 12px;
      padding: 12px;
      background: rgba(20, 0, 0, 0.5);
      border: 1px solid #330000;
    }

    .comments-panel[hidden] {
      display: none !important;
    }

    .comment-item {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #330000;
    }

    .comment-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .comment-author {
      color: #ff6666;
      font-weight: bold;
      margin-right: 8px;
    }

    .comment-date {
      color: #555;
      font-size: 0.8em;
    }

    .comment-text {
      margin-top: 6px;
      color: #ccc;
      line-height: 1.5;
    }

    .comment-empty {
      color: #555;
      font-style: italic;
      margin-bottom: 12px;
    }

    .comment-form {
      margin-top: 14px;
    }

    .comment-nick,
    .comment-input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #440000;
      color: #fff;
      padding: 8px 10px;
      font-family: inherit;
      margin-bottom: 8px;
    }

    .author-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px dashed #330000;
    }

    .edit-form {
      margin-bottom: 10px;
    }

    .edit-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .form-error {
      color: #ff4444;
      font-size: 0.9em;
      margin-top: 8px;
    }

    .form-error[hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="main.html">IAYSISDEAD</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#darkNavbar" aria-controls="darkNavbar" aria-expanded="false" aria-label="Меню">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="darkNavbar">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="main.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link active-link" href="diary.html">Дневник</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Проекты</a></li>
          <li class="nav-item"><a class="nav-link" href="bio.html">Биография</a></li>
          <li class="nav-item"><a class="nav-link" href="contacts.html">Контакты</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5" style="max-width: 720px;">
    <h1>Дневник Отчаявшегося Идиота</h1>
    <p class="diary-subtitle">мемуарчики в реальном времени · читать могут все · пишет только автор</p>

    <div id="auth-bar"></div>

    <form id="login-form" hidden>
      <label class="diary-label" for="login-email">Email автора</label>
      <input class="diary-input" type="email" id="login-email" required autocomplete="username">
      <label class="diary-label" for="login-password">Пароль</label>
      <input class="diary-input" type="password" id="login-password" required autocomplete="current-password">
      <button type="submit" class="diary-btn">Войти</button>
      <p id="login-error" class="form-error" hidden></p>
    </form>

    <div id="composer" hidden>
      <form id="publish-form">
        <label class="diary-label" for="post-content">Что у тебя на душе?</label>
        <textarea class="diary-textarea" id="post-content" placeholder="Выплесни мысль в бездну..." required></textarea>
        <label class="diary-label" for="post-mood">Настроение (необязательно)</label>
        <input class="diary-input" type="text" id="post-mood" placeholder="void, 404, NullPointerException...">
        <button type="submit" class="diary-btn">☠ Опубликовать</button>
        <p id="publish-error" class="form-error" hidden></p>
      </form>
    </div>

    <div id="loading">Загрузка ленты...</div>
    <div id="feed"></div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/diary.js"></script>
</body>
</html>
